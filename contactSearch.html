<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Manager</title>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function()
        {
            readCookie();
        }, false);
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background-color: #F0EEFF;
            min-height: 100vh;
        }

        /* navbar */
        #navbar {
            background: #FFFFFF;
            border-bottom: 0.5px solid #CECBF6;
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #brand-icon {
            width: 34px;
            height: 34px;
            background-color: #AFA9EC;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        #brand-name {
            font-size: 17px;
            font-weight: 600;
            color: #3C3489;
        }

        #loggedInDiv {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #userName {
            font-size: 13px;
            color: #7F77DD;
        }

        #logoutButton {
            height: 32px;
            padding: 0 14px;
            background: none;
            border: 1.5px solid #CECBF6;
            border-radius: 8px;
            color: #534AB7;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        #logoutButton:hover {
            background: #F0EEFF;
        }

        /* main content */
        #main {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* search bar */
        #searchRow {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        #searchText {
            flex: 1;
            height: 40px;
            padding: 0 14px;
            border: 1.5px solid #CECBF6;
            border-radius: 8px;
            background: #FFFFFF;
            color: #26215C;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            color-scheme: light;
        }

        #searchText::placeholder {
            color: #AFA9EC;
        }

        #searchText:focus {
            border-color: #7F77DD;
            box-shadow: 0 0 0 3px #EEEDFE;
        }

        #searchContacts {
            height: 40px;
            padding: 0 18px;
            background: #7F77DD;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #searchContacts:hover {
            background: #534AB7;
        }

        /* contact result message */
        #contactSearchResult {
            display: block;
            font-size: 13px;
            color: #7F77DD;
            margin-bottom: 1rem;
        }

        /* contact cards */
        #contactList {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .contactRow {
            background: #FFFFFF;
            border: 0.5px solid #CECBF6;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .contact-info .contact-name {
            font-size: 15px;
            font-weight: 600;
            color: #26215C;
            margin-bottom: 2px;
        }

        .contact-info .contact-detail {
            font-size: 13px;
            color: #7F77DD;
        }

        .contact-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            height: 32px;
            padding: 0 14px;
            background: #F0EEFF;
            border: 1.5px solid #CECBF6;
            border-radius: 8px;
            color: #534AB7;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-edit:hover {
            background: #CECBF6;
        }

        .btn-delete {
            height: 32px;
            padding: 0 14px;
            background: #FFF0EE;
            border: 1.5px solid #F5C5BE;
            border-radius: 8px;
            color: #D85A30;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #F5C5BE;
        }

        /* add contact button */
        #addContactButton {
            width: 100%;
            height: 42px;
            background: #7F77DD;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #addContactButton:hover {
            background: #534AB7;
        }

        #contactAddResult {
            display: block;
            font-size: 13px;
            color: #D85A30;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="navbar">
        <div id="brand">
            <div id="brand-icon">&#128100;</div>
            <span id="brand-name">Contact Manager</span>
        </div>
        <div id="loggedInDiv">
            <span id="userName"></span>
            <button type="button" id="logoutButton" onclick="doLogout();">Log Out</button>
        </div>
    </div>

    <div id="main">
        <div id="searchRow">
            <input type="text" id="searchText" placeholder="Search contacts..." />
            <button type="button" id="searchContacts" onclick="searchContacts();">Search</button>
        </div>

        <span id="contactSearchResult"></span>

        <div id="contactList"></div>

        <button type="button" id="addContactButton" onclick="doCreateContact();">+ Add Contact</button>
        <span id="contactAddResult"></span>
    </div>

</body>
</html>
