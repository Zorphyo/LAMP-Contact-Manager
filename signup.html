<html>
<head>
	<title>Contact Manager</title>
	<script type="text/javascript" src="js/md5.js"></script>
	<script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">	
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
</head>
<body>

<h1 id="title">Contact Manager</h1>

<div id="loggedInDiv">
	<span id="userName"></span><br />
	<button type="button" id="logoutButton" class="buttons" onclick="doLogout();"> Log Out </button>
</div>
	
<div id="signupDiv">
	<span id="inner-title">Create Account</span>
	<input type="text" id="firstName" placeholder="First Name" /><br />
	<input type="text" id="lastName" placeholder="Last Name" /><br />
	<input type="text" id="username" placeholder="Username" /><br />
	<input type="password" id="password" placeholder="Password"/><br />
	<input type="password" id="confirmPassword" placeholder="Confirm Password"/><br />
	<button type="button" id="loginButton" class="buttons" onclick="doCreateUser();"> Create Account </button>
	<span id="loginResult"></span>
</div>

</body>
</html>
