<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Manager - Sign Up</title>
    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #F9F5E9 0%, #E8DFC9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* brand header */
         #brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2rem;
}

#brand-main {
    font-size: 42px;
    font-weight: 800;
    color: #5C3D2E;
    line-height: 1;
}

#brand-sub {
    font-size: 20px;
    font-weight: 600;
    color: #7A6248;
    margin-top: 4px;
    letter-spacing: 1px;
}
        #brand-center {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* signup card */
        #signupDiv {
            background-color: #FFFEFC;
            border: 2px solid #D7C7A5;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        #inner-title {
            display: block;
            font-size: 19px;
            font-weight: 600;
            color: #5C3D2E;
            letter-spacing: -0.2px;
            margin-bottom: 4px;
        }

        #signup-subtitle {
            display: block;
            font-size: 14px;
            color: #7A6248;
            margin-bottom: 1.5rem;
        }

        /* name row */
        .name-row {
            display: flex;
            gap: 10px;
        }

        .name-row .field {
            flex: 1;
        }

        /* fields */
        .field {
            margin-bottom: 0.75rem;
        }

        .field-label {
           color: #6B4F3A;
       }

        /* inputs */
        #firstName,
        #lastName,
        #username,
        #password,
        #confirmPassword {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border: 1.5px solid #CECBF6;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #26215C;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            color-scheme: light;
        }

        #firstName::placeholder,
        #lastName::placeholder,
        #username::placeholder,
        #password::placeholder,
        #confirmPassword::placeholder {
             color: #AFA9EC;
        }

        #firstName:focus,
        #lastName:focus,
        #username:focus,
        #password:focus,
        #confirmPassword:focus {
            border-color: #7A6248;
           box-shadow: 0 0 0 3px #F2E0CB;
        }

        /* create account button */
        #signupButton {
            width: 100%;
            height: 40px;
            margin-top: 1.25rem;
            background-color: #7A6248;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #signupButton:hover {
            background-color: #5C3D2E;
        }

        #signupResult {
            display: block;
            font-size: 13px;
            color: #D85A30;
            margin-top: 8px;
            text-align: center;
        }

        /* divider */
        #divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0;
        }

        #divider hr {
            flex: 1;
            border: none;
            border-top: 0.5px solid #CECBF6;
        }

        #divider span {
            font-size: 12px;
            color: #AFA9EC;
        }

        /* login row */
        #loginRow {
            text-align: center;
            font-size: 13px;
            color: #7A6248;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            width: auto !important;
        }

        #loginButton {
            background: none;
            border: none;
            color: #7A6248;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        #loginButton:hover {
            text-decoration: underline;
        }

#pageLayout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    width: 100%;
    min-height: 100vh;
    padding: 20px;
}

#contentArea {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.side-goat {
    width: 320px;
    max-width: 25vw;
    height: auto;
    user-select: none;
    pointer-events: none;
}

.right-goat {
    transform: scaleX(-1);
}
    </style>
</head>
<body>

<div id="pageLayout">

    <img class="side-goat left-goat"
         src="images/JumpingGoat.png"
         alt="Goat" />

    <div id="contentArea">
    <main>
        
        <div id="brand">
            <span id="brand-main">Lowkey Goated</span>
            <span id="brand-sub">Contact Manager</span>
        </div>

        <div id="signupDiv">
            <span id="inner-title">Create an account</span>
            <span id="signup-subtitle">Fill in your details to get started</span>
    
            <div class="name-row">
                <div class="field">
                    <label class="field-label" for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="First Name" />
                </div>
                <div class="field">
                    <label class="field-label" for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Last Name" />
                </div>
            </div>
    
            <div class="field">
                <label class="field-label" for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" />
            </div>
    
            <div class="field">
                <label class="field-label" for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" />
            </div>
    
            <div class="field">
                <label class="field-label" for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
            </div>
    
            <button type="button" id="signupButton" onclick="doCreateUser();">Create account</button>
            <span id="signupResult"></span>
    
            <div id="divider">
                <hr /><span>or</span><hr />
            </div>
    
            <div id="loginRow">
                Already GOATed?
                <button type="button" id="loginButton" onclick="window.location.href='index.html';">Sign in</button>
            </div>
        </div>

    </main>
    </div>

    <img class="side-goat right-goat"
         src="images/JumpingGoat.png"
         alt="Goat" />

</div>
</body>
</html>
