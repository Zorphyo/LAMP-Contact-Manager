<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Manager</title>
    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function()
        {
            readCookie();

            let contactJSON = sessionStorage.getItem("editingContact");

            if(contactJSON)
            {
                let contact = JSON.parse(contactJSON);

                document.getElementById("title").innerHTML = "Edit Contact";
                document.getElementById("inner-title").innerHTML = "Edit Contact";

                document.getElementById("firstName").value = contact.FirstName;
                document.getElementById("lastName").value = contact.LastName;
                document.getElementById("phone").value = contact.Phone;
                document.getElementById("email").value = contact.Email;

                document.getElementById("submitButton").innerHTML = "Save Changes";
                document.getElementById("submitButton").onclick = saveContact;
            }
        }, false);
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #F9F5E9 0%, #E8DFC9 100%);
            min-height: 100vh;
        }

        /* navbar */
        #navbar {
            background: #FFFEFC;
            border-bottom: 2px solid #D7C7A5;
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        #brand {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        #brand-main {
            font-size: 20px;
            font-weight: 800;
            color: #5C3D2E;
        }

        #brand-sub {
            font-size: 11px;
            font-weight: 600;
            color: #7A6248;
            letter-spacing: 1px;
        }

        #loggedInDiv {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #userName {
            font-size: 13px;
            color: #7A6248;
        }

        #logoutButton {
            height: 32px;
            padding: 0 14px;
            background: none;
            border: 1.5px solid #D7C7A5;
            border-radius: 8px;
            color: #5C3D2E;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        #logoutButton:hover {
            background: #F0E9D8;
        }

        /* page layout */
        #pageLayout {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
            width: 100%;
            padding: 2rem 20px;
            min-height: calc(100vh - 56px);
        }

        .side-goat {
            width: 220px;
            max-width: 18vw;
            height: auto;
            user-select: none;
            pointer-events: none;
            margin-top: 2rem;
        }

        .right-goat {
            transform: scaleX(-1);
        }

        /* card */
        #signupDiv {
            background: #FFFEFC;
            border: 2px solid #D7C7A5;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        #inner-title {
            display: block;
            font-size: 19px;
            font-weight: 600;
            color: #5C3D2E;
            letter-spacing: -0.2px;
            margin-bottom: 4px;
        }

        #form-subtitle {
            display: block;
            font-size: 14px;
            color: #7A6248;
            margin-bottom: 1.5rem;
        }

        /* name row */
        .name-row {
            display: flex;
            gap: 10px;
        }

        .name-row .field {
            flex: 1;
        }

        /* fields */
        .field {
            margin-bottom: 0.75rem;
        }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #6B4F3A;
            margin-bottom: 6px;
        }

        /* inputs */
        #firstName,
        #lastName,
        #phone,
        #email {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border: 1.5px solid #D7C7A5;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #5C3D2E;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            color-scheme: light;
        }

        #firstName::placeholder,
        #lastName::placeholder,
        #phone::placeholder,
        #email::placeholder {
            color: #B5A48A;
        }

        #firstName:focus,
        #lastName:focus,
        #phone:focus,
        #email:focus {
            border-color: #7A6248;
            box-shadow: 0 0 0 3px #F2E0CB;
        }

        /* submit button */
        #submitButton {
            width: 100%;
            height: 40px;
            margin-top: 1.25rem;
            background-color: #7A6248;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #submitButton:hover {
            background-color: #5C3D2E;
        }

        #loginResult {
            display: block;
            font-size: 13px;
            color: #D85A30;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="contentArea">
    <h1 id="title" style="display:none;">Create Contact</h1>

    <div id="navbar">
        <div id="brand">
            <span id="brand-main">Lowkey Goated</span>
            <span id="brand-sub">Contact Manager</span>
        </div>

        <div id="loggedInDiv">
            <span id="userName"></span>
            <button type="button" id="logoutButton" onclick="doContactSearch();">
                &#8592; Back
            </button>
        </div>
    </div>

    <div id="pageLayout">


        <img
            src="images/JumpingGoat.png"
            alt="Left Goat"
            class="side-goat"
        >


        <div id="signupDiv">
            <span id="inner-title">Create Contact</span>
            <span id="form-subtitle">Fill in the contact details below</span>

            <div class="name-row">
                <div class="field">
                    <label class="field-label" for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="First Name">
                </div>

                <div class="field">
                    <label class="field-label" for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Last Name">
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter phone number">
            </div>

            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input type="text" id="email" placeholder="Enter email address">
            </div>

            <button type="button" id="submitButton" onclick="createContact();">
                Create Contact
            </button>

            <span id="loginResult"></span>
        </div>


        <img
            src="images/JumpingGoat.png"
            alt="Right Goat"
            class="side-goat right-goat"
        >

    </div>
</div>

</body>
