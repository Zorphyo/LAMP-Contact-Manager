<html>
<head>
	<title>Contact Manager</title>
	<script type="text/javascript" src="js/md5.js"></script>
	<script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">	
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">

	<script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function()
	{
	    readCookie();
	
	    let contactJSON =
	        sessionStorage.getItem("editingContact");
	
	    if(contactJSON)
	    {
	        let contact = JSON.parse(contactJSON);
	
	        document.getElementById("title").innerHTML =
	            "Edit Contact";
	
	        document.getElementById("inner-title").innerHTML =
	            "Edit Contact";
	
	        document.getElementById("firstName").value =
	            contact.FirstName;
	
	        document.getElementById("lastName").value =
	            contact.LastName;
	
	        document.getElementById("phone").value =
	            contact.Phone;
	
	        document.getElementById("email").value =
	            contact.Email;
	
	        document.getElementById("loginButton").innerHTML =
	            "Save Changes";
	
	        document.getElementById("loginButton").onclick =
	            saveContact;
	    }
	}, false);
	</script>
	
</head>
<body>

<h1 id="title">Create Contact</h1>

<div id="loggedInDiv">
	<span id="userName"></span><br />
	<button type="button" id="logoutButton" class="buttons" onclick="doContactSearch();"> Back </button>
</div>

<div id="signupDiv">
	<span id="inner-title">Create Contact</span>
	<input type="text" id="firstName" placeholder="First Name" /><br />
	<input type="text" id="lastName" placeholder="Last Name" /><br />
	<input type="text" id="phone" placeholder="Phone Number" /><br />
	<input type="text" id="email" placeholder="Email"/><br />
	<button type="button" id="loginButton" class="buttons" onclick="createContact();"> Create Contact </button>
	<span id="loginResult"></span>
</div>

</body>
</html>
