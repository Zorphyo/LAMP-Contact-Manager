<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Manager</title>
    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #F9F5E9 0%, #E8DFC9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* brand header */
        #brand {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
        }

        #brand-icon {
            width: 50px;
            height: 50px;
            background-color: #7A9E48;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

       #brand-icon-mirror {
            width: 50px;
            height: 50px;
            background-color: #7A9E48;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            transform: scaleX(-1);
        }

        #brand-name {
            font-size: 26px;
            font-weight: 700;
            color: #5C3D2E;
        }
        #brand-center {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* login card */
        #loginDiv {
            background-color: #FFFDF7;
            border: 2px solid #D7C7A5;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        #inner-title {
            display: block;
            font-size: 22px;
            font-weight: 700;
            color: #5C3D2E;
            margin-bottom: 4px;
        }

        #login-subtitle {
            display: block;
            font-size: 14px;
            color: #7A6248;
            margin-bottom: 1.75rem;
        }

        /* labels */
        .field-label {
           color: #6B4F3A;
       }

        /* inputs */
        #loginName,
        #loginPassword {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border: 1.5px solid #CECBF6;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #26215C;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            color-scheme: light;
        }

        #loginName::placeholder,
        #loginPassword::placeholder {
            color: #AFA9EC;
        }

        #loginName:focus,
        #loginPassword:focus {
           border-color: #7A9E48;
           box-shadow: 0 0 0 3px #E8F2D8;
}

        /* sign in button */
        #loginButton {
            width: 100%;
            height: 40px;
            margin-top: 1.25rem;
            background-color: #7A9E48;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #loginButton:hover {
            background-color: #5F7C36;
        }

        #loginResult {
            display: block;
            font-size: 13px;
            color: #D85A30;
            margin-top: 8px;
            text-align: center;
        }

        /* divider */
        #divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0;
        }

        #divider hr {
            flex: 1;
            border: none;
            border-top: 0.5px solid #CECBF6;
        }

        #divider span {
            font-size: 12px;
            color: #AFA9EC;
        }

        /* sign up section */
        #signupDiv {
            text-align: center;
            font-size: 13px;
            color: #7A6248;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            width: auto !important;
        }

        #signupButton {
            background: none;
            border: none;
            color: #5F7C36;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        #signupButton:hover {
            text-decoration: underline;
        }
#pageLayout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    width: 100%;
    min-height: 100vh;
    padding: 20px;
}

#contentArea {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.side-goat {
    width: 320px;
    max-width: 25vw;
    height: auto;
    user-select: none;
    pointer-events: none;
}

.right-goat {
    transform: scaleX(-1);
}
    </style>
</head>
<body>

    <div id="pageLayout">

    <img class="side-goat left-goat"
         src="images/JumpingGoat.png"
         alt="Goat" />

    <div id="contentArea">

        <div id="brand">
            <div id="brand-icon">🐐</div>
            <span id="brand-name">Lowkey Goated Contact Manager</span>
            <div id="brand-icon-mirror">🐐</div>
        </div>

        <div id="loginDiv">
            <span id="inner-title">Welcome back, GOAT</span>
            <span id="login-subtitle">Sign in to your account to continue</span>

            <label class="field-label" for="loginName">Username</label>
            <input type="text" id="loginName" placeholder="Enter your username" />

            <label class="field-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" />

            <button type="button" id="loginButton" onclick="doLogin();">Sign in</button>
            <span id="loginResult"></span>

            <div id="divider">
                <hr /><span>or</span><hr />
            </div>

            <div id="signupDiv">
                Don't have an account?
                <button type="button" id="signupButton" onclick="doSignup();">Sign up</button>
            </div>
        </div>

    </div>

    <img class="side-goat right-goat"
         src="images/JumpingGoat.png"
         alt="Goat" />

</div>

</body>
</html>
