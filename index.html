<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Manager</title>
    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background-color: #F0EEFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* brand header */
        #brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        #brand-icon {
            width: 40px;
            height: 40px;
            background-color: #AFA9EC;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        #brand-name {
            font-size: 21px;
            font-weight: 600;
            color: #3C3489;
            letter-spacing: -0.3px;
        }

        /* login card */
        #loginDiv {
            background-color: #FFFFFF;
            border: 0.5px solid #CECBF6;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
        }

        #inner-title {
            display: block;
            font-size: 19px;
            font-weight: 600;
            color: #26215C;
            letter-spacing: -0.2px;
            margin-bottom: 4px;
        }

        #login-subtitle {
            display: block;
            font-size: 14px;
            color: #7F77DD;
            margin-bottom: 1.75rem;
        }

        /* labels */
        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #534AB7;
            margin-bottom: 6px;
            margin-top: 1rem;
        }

        /* inputs */
        #loginName,
        #loginPassword {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border: 1.5px solid #CECBF6;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #26215C;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            color-scheme: light;
        }

        #loginName::placeholder,
        #loginPassword::placeholder {
            color: #AFA9EC;
        }

        #loginName:focus,
        #loginPassword:focus {
            border-color: #7F77DD;
            box-shadow: 0 0 0 3px #EEEDFE;
        }

        /* sign in button */
        #loginButton {
            width: 100%;
            height: 40px;
            margin-top: 1.25rem;
            background-color: #7F77DD;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #loginButton:hover {
            background-color: #534AB7;
        }

        #loginResult {
            display: block;
            font-size: 13px;
            color: #D85A30;
            margin-top: 8px;
            text-align: center;
        }

        /* divider */
        #divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0;
        }

        #divider hr {
            flex: 1;
            border: none;
            border-top: 0.5px solid #CECBF6;
        }

        #divider span {
            font-size: 12px;
            color: #AFA9EC;
        }

        /* sign up section */
        #signupDiv {
            text-align: center;
            font-size: 13px;
            color: #7F77DD;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            width: auto !important;
        }

        #signupButton {
            background: none;
            border: none;
            color: #534AB7;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        #signupButton:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="brand">
        <div id="brand-icon">&#128100;</div>
        <span id="brand-name">Contact Manager</span>
    </div>

    <div id="loginDiv">
        <span id="inner-title">Welcome back</span>
        <span id="login-subtitle">Sign in to your account to continue</span>

        <label class="field-label" for="loginName">Username</label>
        <input type="text" id="loginName" placeholder="Enter your username" />

        <label class="field-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />

        <button type="button" id="loginButton" onclick="doLogin();">Sign in</button>
        <span id="loginResult"></span>

        <div id="divider">
            <hr /><span>or</span><hr />
        </div>

        <div id="signupDiv">
            Don't have an account?
            <button type="button" id="signupButton" onclick="doSignup();">Sign up</button>
        </div>
    </div>

</body>
</html>
